<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeguraNet | Login</title>
  <link href="seguraNet-icon.png" rel="icon" type="image/x-icon">
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <main class="page">
    <section class="card">
      <!-- LOGO -->
      <div class="brand">
        <img class="logo" src="seguranet-logo.png" alt="SeguraNet Logo" />
        <p class="tagline">Secure Online Information Management</p>
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            <span>Remember me</span>
          </label>
          <a class="link" href="#">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Log in</button>

        <p class="signup">
          Don’t have an account?
          <a class="link" href="CreateAccount.html">Create one</a>
        </p>

        <p class="footer">© 2026 SeguraNet</p>
      </form>
    </section>
  </main>

  <script>
    // API URL — replace port if different
    const apiUrl = "https://localhost:7071/api/users/login";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (!response.ok) {
          alert("Login failed! Check your email and password.");
          return;
        }

        const result = await response.json();
        console.log("Login success:", result);
        alert(`Welcome, ${result.username}!`);
        // TODO: Redirect to dashboard or homepage
      } catch (err) {
        console.error("Error:", err);
        alert("Error connecting to API");
      }
    });
  </script>
</body>
</html>
